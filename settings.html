<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDFZero – Settings</title>
  <style>
    :root {
      --bg: #ffffff; --bg2: #f5f5f5; --text: #333; --text2: #666;
      --border: #ddd; --accent: #1a73e8; --accent-hover: #1557b0;
    }
    body.dark {
      --bg: #1e1e1e; --bg2: #2d2d2d; --text: #e0e0e0; --text2: #aaa;
      --border: #444; --accent: #4a9eff; --accent-hover: #2b7de9;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--text); padding: 24px; max-width: 640px; margin: 0 auto;
    }
    h1 { font-size: 20px; margin-bottom: 4px; }
    .subtitle { color: var(--text2); font-size: 13px; margin-bottom: 24px; }
    section { margin-bottom: 24px; background: var(--bg2); border-radius: 8px; padding: 16px; }
    section h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text2); margin-bottom: 12px; }
    .row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); }
    .row:last-child { border-bottom: none; }
    .row label { font-size: 14px; }
    .row input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--accent); }
    .row select, .row input[type="color"] { height: 30px; }
    .row select { padding: 0 8px; border: 1px solid var(--border); border-radius: 4px; background: var(--bg); color: var(--text); }
    .row input[type="color"] { width: 36px; padding: 2px; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; }
    .note { font-size: 12px; color: var(--text2); margin-top: 24px; padding: 12px; background: var(--bg2); border-radius: 6px; }
    .theme-toggle { position: fixed; top: 16px; right: 16px; background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; padding: 6px 12px; cursor: pointer; font-size: 13px; color: var(--text); }
  </style>
</head>
<body>
  <button class="theme-toggle" id="themeToggle">Dark Mode</button>
  <h1>PDFZero Settings</h1>
  <p class="subtitle">Configure the PDF viewer extension preferences.</p>

  <section>
    <h2>Appearance</h2>
    <div class="row">
      <label for="theme">Theme</label>
      <select id="theme"><option value="light">Light</option><option value="dark">Dark</option></select>
    </div>
    <div class="row">
      <label for="bgColor">Viewer Background Color</label>
      <input type="color" id="bgColor" value="#525659">
    </div>
    <div class="row">
      <label for="density">Layout Density</label>
      <select id="density"><option value="compact">Compact</option><option value="normal" selected>Normal</option><option value="comfortable">Comfortable</option></select>
    </div>
  </section>

  <section>
    <h2>Rendering</h2>
    <div class="row"><label>Enable WebGL</label><input type="checkbox" id="webgl"></div>
    <div class="row"><label>Auto-Rotate Pages</label><input type="checkbox" id="autoRotate" checked></div>
    <div class="row"><label>Use Only CSS Zoom</label><input type="checkbox" id="cssZoom"></div>
    <div class="row"><label>Disable Page Labels</label><input type="checkbox" id="disableLabels"></div>
    <div class="row"><label>Disable Auto Fetch</label><input type="checkbox" id="disableAutofetch"></div>
    <div class="row"><label>Disable Font Face</label><input type="checkbox" id="disableFontface"></div>
    <div class="row"><label>Disable Range Requests</label><input type="checkbox" id="disableRange"></div>
    <div class="row"><label>Disable Stream</label><input type="checkbox" id="disableStream"></div>
  </section>

  <section>
    <h2>Behavior</h2>
    <div class="row"><label>Enforce Document Permissions</label><input type="checkbox" id="enforcePerms"></div>
    <div class="row"><label>Enable Print</label><input type="checkbox" id="enablePrint" checked></div>
    <div class="row"><label>Update Browser History</label><input type="checkbox" id="historyUpdate" checked></div>
    <div class="row"><label>Update URL Hash</label><input type="checkbox" id="urlUpdate" checked></div>
    <div class="row"><label>Ignore Destination Zoom</label><input type="checkbox" id="ignoreDestZoom"></div>
    <div class="row"><label>PDF Bug Compatibility Mode</label><input type="checkbox" id="pdfBug"></div>
    <div class="row"><label>Render Interactive Forms</label><input type="checkbox" id="interactiveForms" checked></div>
  </section>

  <div class="note">
    <strong>Note:</strong> To view local PDF files, you must enable "Allow access to file URLs" in the extension details page at <code>chrome://extensions</code>.
  </div>
  <p style="text-align:center;margin-top:20px;color:var(--text2);font-size:13px;">Made by <a href="https://www.linkedin.com/in/ishtiaque2/" target="_blank" rel="noopener noreferrer" style="color:var(--accent);text-decoration:none;">Tanim</a></p>

  <script src="settings.js"></script>
</body>
</html>
